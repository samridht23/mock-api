basePath: /
definitions:
  AssignQuestionsInput:
    properties:
      question_ids:
        example:
        - aB3xK9mP
        - xK9mPaB3
        items:
          type: string
        type: array
    required:
    - question_ids
    type: object
  CreateTestRequest:
    properties:
      course_id:
        example: 123e4567
        type: string
      description:
        example: This is test description
        maxLength: 250
        type: string
      title:
        example: Test Title
        maxLength: 100
        minLength: 3
        type: string
    required:
    - course_id
    - title
    type: object
  QuestionResponse:
    properties:
      content_hash:
        example: b48922ecd8a1590f08ce412a35a72480
        type: string
      diagram_url:
        example: "false"
        type: string
      difficulty:
        example: easy
        type: string
      explanation:
        example: Basic arithmetic
        type: string
      has_latex:
        example: false
        type: boolean
      id:
        example: aB3xK9mP
        type: string
      options:
        example:
        - "2"
        - "3"
        - "4"
        - "5"
        items:
          type: string
        type: array
      question_text:
        example: What is 2 + 2?
        type: string
      tags:
        example:
        - math
        - arithmetic
        items:
          type: string
        type: array
    type: object
  UpdateTestRequest:
    properties:
      description:
        example: Update test description
        maxLength: 250
        type: string
      max_time_seconds:
        example: 9000
        minimum: 60
        type: integer
      title:
        example: Updated Test Title
        maxLength: 100
        minLength: 3
        type: string
    required:
    - max_time_seconds
    - title
    type: object
  handler.Test:
    properties:
      course_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      max_time_seconds:
        type: integer
      title:
        type: string
      total_questions:
        type: integer
    type: object
  utils.ErrorResponse:
    properties:
      code:
        type: string
      details:
        additionalProperties: true
        type: object
      error:
        type: string
    type: object
  utils.MessageResponse:
    properties:
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Mock backend
  title: Mock API
  version: "1.0"
paths:
  /tests:
    get:
      description: Retrieves a list of all tests ordered by creation date (oldest
        first)
      produces:
      - application/json
      responses:
        "200":
          description: List of tests retrieved successfully
          schema:
            items:
              $ref: '#/definitions/handler.Test'
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: List all tests
      tags:
      - Tests
    post:
      consumes:
      - application/json
      description: Creates a new test under a specified course with default duration
        of 2 hours (7200 seconds)
      parameters:
      - description: Test creation details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateTestRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Test created successfully
          schema:
            $ref: '#/definitions/handler.Test'
        "400":
          description: Invalid request body or missing required fields
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Course not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "422":
          description: Validation errors
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Create a new test
      tags:
      - Tests
  /tests/{test_id}:
    get:
      description: Retrieves detailed information about a specific test including
        title, description, question count, and time limit
      parameters:
      - description: Test ID
        in: path
        name: test_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Test found successfully
          schema:
            $ref: '#/definitions/handler.Test'
        "404":
          description: Test not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Get a test metadata by ID
      tags:
      - Tests
    put:
      consumes:
      - application/json
      description: Updates the title and maximum time allowed for a test
      parameters:
      - description: Test ID
        in: path
        name: test_id
        required: true
        type: string
      - description: Test update details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateTestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Test updated successfully
          schema:
            $ref: '#/definitions/utils.MessageResponse'
        "400":
          description: Invalid request body or validation failed
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Test not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Update test metadata
      tags:
      - Tests
  /tests/{test_id}/questions:
    get:
      description: Retrieves all questions assigned to a test in their specified order,
        including question text, options, difficulty, and tags
      parameters:
      - description: Test ID
        in: path
        name: test_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              ' questions':
                items:
                  $ref: '#/definitions/QuestionResponse'
                type: array
              ' total_questions':
                type: number
              test_id:
                type: string
            type: object
        "400":
          description: Invalid test ID
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Get test questions
      tags:
      - Tests
    post:
      consumes:
      - application/json
      description: Replaces all questions for a test with a new set. Existing questions
        are removed and new ones are added in the specified order. Pass an empty array
        to clear all questions.
      parameters:
      - description: Test ID
        in: path
        name: test_id
        required: true
        type: string
      - description: Question IDs to assign
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/AssignQuestionsInput'
      produces:
      - application/json
      responses:
        "200":
          description: Questions assigned successfully
          schema:
            properties:
              test_id:
                type: string
              total_questions:
                type: integer
            type: object
        "400":
          description: Invalid request body or validation failed
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Test not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Assign questions to test
      tags:
      - Tests
  /tests/{test_id}/start:
    post:
      description: Starts a test session for a user, records start time, calculates
        and stores the absolute end time
      parameters:
      - description: Test ID
        in: path
        name: test_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Test started successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Test not found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Start a test
      tags:
      - Tests
swagger: "2.0"
